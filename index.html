<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell Motorsports Collection Controller</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <button id="connect">Connect</button>

    <div id="controls" class="disabled">
        <button data-key="forward">W</button>
        <button data-key="left">A</button>
        <button data-key="backward">S</button>
        <button data-key="right">D</button>
    </div>

    <button id="turbo" class="disabled">Turbo OFF</button>

    <script type="module" src="js/main.js"></script>
</body>
</html>
